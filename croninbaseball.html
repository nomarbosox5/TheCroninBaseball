<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>The Cronin Baseball</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--gold:#f1c40f;--blue:#3498db;--grass:#1b3318}
body{background:#000;width:100vw;min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:#fff;overflow-x:hidden}

#hero{
  min-height:100vh;
  background:radial-gradient(ellipse at 50% 88%,#1a4d20 0%,#07090d 62%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 24px 80px;text-align:center;
}

h1{
  font-family:'Cinzel Decorative','Palatino Linotype',serif;
  font-weight:700;
  font-size:clamp(26px,8vw,56px);
  color:var(--gold);
  letter-spacing:.04em;
  line-height:1.15;
  text-shadow:0 2px 32px rgba(212,168,67,.45);
  margin-bottom:18px;
}

.sub{
  font-family:'Georgia',serif;
  font-style:italic;
  font-size:clamp(13px,3vw,18px);
  color:rgba(255,255,255,.5);
  letter-spacing:.03em;
  margin-bottom:48px;
  max-width:520px;
}

.btn-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:center}

.btn{
  display:inline-block;
  padding:16px 40px;
  font-family:'Cinzel Decorative','Palatino Linotype',serif;
  font-size:clamp(12px,2.5vw,15px);
  letter-spacing:.08em;
  font-weight:700;
  text-decoration:none;
  border-radius:3px;
  cursor:pointer;
  transition:.14s all;
}

.btn-gold{
  background:var(--gold);
  color:#000;
  border:2px solid var(--gold);
  box-shadow:0 0 28px rgba(241,196,15,.35);
}
.btn-gold:hover{box-shadow:0 0 42px rgba(241,196,15,.55);transform:translateY(-2px)}

.btn-outline{
  background:transparent;
  color:var(--gold);
  border:2px solid rgba(241,196,15,.45);
}
.btn-outline:hover{border-color:var(--gold);transform:translateY(-2px)}

.diamond{
  width:90px;height:90px;
  position:relative;
  transform:rotate(45deg);
  margin:0 auto 44px;
}
.base{
  position:absolute;width:28px;height:28px;
  border:2px solid rgba(241,196,15,.6);
  background:rgba(241,196,15,.08);
  border-radius:3px;
}
.base.home{bottom:0;left:50%;transform:translateX(-50%)}
.base.first{right:0;top:50%;transform:translateY(-50%)}
.base.second{top:0;left:50%;transform:translateX(-50%)}
.base.third{left:0;top:50%;transform:translateY(-50%)}

.stats{
  display:flex;gap:40px;margin-top:60px;flex-wrap:wrap;justify-content:center;
}
.stat{text-align:center}
.stat-num{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(22px,5vw,36px);
  color:var(--gold);
  font-weight:700;
  line-height:1;
}
.stat-label{
  font-size:11px;letter-spacing:.12em;text-transform:uppercase;
  color:rgba(255,255,255,.35);margin-top:6px;
}

footer{
  text-align:center;padding:24px;
  font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.06em;
}
</style>
</head>
<body>

<section id="hero">
  <div class="diamond">
    <div class="base home"></div>
    <div class="base first"></div>
    <div class="base second"></div>
    <div class="base third"></div>
  </div>

  <h1>The Cronin Baseball</h1>
  <p class="sub">Step up to the plate. Choose your city. Play ball.</p>

  <div class="btn-row">
    <a class="btn btn-gold" href="index.html">Play Now</a>
    <a class="btn btn-outline" href="#">Leaderboard</a>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-num">30</div>
      <div class="stat-label">Teams</div>
    </div>
    <div class="stat">
      <div class="stat-num">9</div>
      <div class="stat-label">Innings</div>
    </div>
    <div class="stat">
      <div class="stat-num">∞</div>
      <div class="stat-label">Games</div>
    </div>
  </div>
</section>

<footer>THE CRONIN BASEBALL &nbsp;&middot;&nbsp; EST. 2025</footer>

</body>
</html>
